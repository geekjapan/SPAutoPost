# SPAutoPost Azure hosted 設定サンプル。
# 使い方: Container Apps / Jobs ではこの内容を config/default.yml 相当に焼き込むか、
# runtime volume / secret 管理から渡す。Secret 実値は Azure 側の secret reference に置く。

app:
  environment: production
  dry_run: true
  log_level: info

server:
  admin_ui_enabled: true
  admin_api_enabled: true
  auth_provider: entra_id

storage:
  provider: postgresql
  database_url: env:SPAUTOPOST_DATABASE_URL
  sqlite_path: null

llm:
  provider: test_mock
  prompt_version: v1

sharepoint:
  mode: site-page
  default_draft: true
  allow_publish: false
  tenant_id: env:SPAUTOPOST_TENANT_ID
  site_id: env:SPAUTOPOST_SHAREPOINT_SITE_ID
  page_library_id: env:SPAUTOPOST_SHAREPOINT_PAGE_LIBRARY_ID

sources:
  manual:
    enabled: false
    input_dir: ./samples/advisories
  nvd:
    enabled: false
    api_key: env:SPAUTOPOST_NVD_API_KEY
  myjvn:
    enabled: false

graph:
  local_poc_auth: delegated
  hosted_auth: undecided

security:
  block_auto_publish: true
  require_approval: true
  redact_secrets_in_logs: true
