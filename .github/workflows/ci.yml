name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -d src ]; then
            pip install -e ".[dev]"
          else
            pip install ruff mypy pytest pytest-cov
          fi
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (src のみ、存在時)
        run: |
          if [ -d src ]; then
            mypy src
          else
            echo "src/ が無いため mypy をスキップ"
          fi
      - name: Pytest + coverage (src 存在時のみ)
        run: |
          if [ -d src ]; then
            python -m pytest --cov=src --cov-report=term-missing
          else
            echo "src/ が無いためテストをスキップ（コード投入後に coverage 80% ゲートが有効化）"
          fi

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
