name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    # PostgreSQL backend の contract suite を実 DB で検証するためのサービス。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spautopost
          POSTGRES_PASSWORD: spautopost
          POSTGRES_DB: spautopost_test
        ports:
          - 5432:5432
        # 接続可能になるまで待機（DB 準備前のテスト失敗を防ぐ）。
        options: >-
          --health-cmd "pg_isready -U spautopost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # contract suite の PostgreSQL backend を有効化する（未設定時は skip）。
      SPAUTOPOST_TEST_DATABASE_URL: postgresql://spautopost:spautopost@localhost:5432/spautopost_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -d src ]; then
            # postgres extra を含め、両 backend の contract suite を CI で実行する。
            pip install -e ".[dev,postgres]"
          else
            pip install ruff mypy pytest pytest-cov
          fi
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (src のみ、存在時)
        run: |
          if [ -d src ]; then
            mypy src
          else
            echo "src/ が無いため mypy をスキップ"
          fi
      - name: Pytest + coverage (src 存在時のみ、sqlite + postgres 両 backend)
        run: |
          if [ -d src ]; then
            python -m pytest --cov=src --cov-report=term-missing
          else
            echo "src/ が無いためテストをスキップ（コード投入後に coverage 80% ゲートが有効化）"
          fi

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
